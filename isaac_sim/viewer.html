<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Isaac Sim Viewer</title>
  <style>
    * { margin: 0; padding: 0; }
    body { background: #1e1e1e; display: flex; align-items: center; justify-content: center; height: 100vh; }
    video { max-width: 100%; max-height: 100vh; object-fit: contain; }
    #status { position: fixed; top: 10px; left: 10px; color: #888; font: 14px monospace; }
  </style>
</head>
<body>
  <div id="status">Connecting...</div>
  <video id="video" autoplay muted playsinline></video>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const url = 'http://localhost:8090/hls/stream.m3u8';
    const video = document.getElementById('video');
    const status = document.getElementById('status');

    if (Hls.isSupported()) {
      const hls = new Hls({
        liveSyncDurationCount: 2,
        liveMaxLatencyDurationCount: 5,
        liveDurationInfinity: true,
        lowLatencyMode: false,
        enableWorker: true,
        backBufferLength: 0,
      });
      hls.loadSource(url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        status.textContent = 'Playing';
        video.play();
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        status.textContent = `Error: ${data.details}`;
        if (data.fatal) {
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) hls.startLoad();
          else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) hls.recoverMediaError();
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
      video.addEventListener('playing', () => { status.textContent = 'Playing'; });
    } else {
      status.textContent = 'HLS not supported in this browser';
    }
  </script>
</body>
</html>
