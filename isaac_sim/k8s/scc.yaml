apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: robotics-rl-scc
allowPrivilegedContainer: false
allowPrivilegeEscalation: true
allowedCapabilities:
  - NET_ADMIN
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - emptyDir
  - secret
  - configMap
  - projected
  - downwardAPI
  - persistentVolumeClaim
users:
  - system:serviceaccount:robotics-rl:default
