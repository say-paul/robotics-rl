# ============================================================================
# Unitree G1 + GR00T N1.6 VLA + SONIC Whole-Body Control
# ============================================================================
# SONIC WBC uses an encoder-decoder architecture with full-body 29-DOF control.
# Unlike decoupled WBC (15-DOF lower body + interpolation upper body), SONIC
# jointly controls all 29 joints through a unified policy.
#
# Pipeline: VLA → Planner → Encoder → Decoder → PD Control
# ============================================================================

# ----------------------------------------------------------------------------
# STAGE 0: Variables
# ----------------------------------------------------------------------------
variables:
  # Override in .env or environment. See .env.example.
  GROOT_WBC_ROOT: ""
  RDP_ROOT: ""
# ----------------------------------------------------------------------------
# STAGE 1: Metadata
# ----------------------------------------------------------------------------
metadata:
  name: "g1_sonic_wbc"
  version: "1.0.0"
  robot_type: "humanoid"
  manufacturer: "Unitree"
  description: "G1 humanoid with GR00T N1.6 VLA + SONIC whole-body control"
  hardware_revision: "G1-2024"
  software_revision: "SONIC-v1.0-GR00T-N1.6"

# ----------------------------------------------------------------------------
# STAGE 2: Hardware Definition
# ----------------------------------------------------------------------------
hardware:
  description:
    urdf:
      file: "${GROOT_WBC_ROOT}/gear_sonic/data/robots/g1/g1_29dof.urdf"
      mesh_directory: "${GROOT_WBC_ROOT}/gear_sonic/data/robots/g1/meshes"

    # Default world scenes per simulator.  launch_robot.py picks the right
    # one based on --world <name>, or the user can override with
    # --world /path/to/custom_scene.<ext>
    worlds:
      mujoco:    "${GROOT_WBC_ROOT}/gear_sonic_deploy/g1/scene_29dof.xml"
      # Robot USD (import into an Isaac Sim stage with ground plane + lighting)
      isaac_sim: "${GROOT_WBC_ROOT}/gear_sonic/data/robots/g1/g1_29dof_rev_1_0/g1_29dof_rev_1_0.usd"
      isaac_lab: "${GROOT_WBC_ROOT}/gear_sonic/data/robots/g1/g1_29dof_rev_1_0/g1_29dof_rev_1_0.usd"


  sensors:
    - name: "torso_imu"
      type: "imu"
      topic: "/imu/data"
      frame_id: "torso_link"
      rate_hz: 500

    - name: "head_camera_rgb"
      type: "camera"
      modality: "rgb"
      topic: "/camera/rgb/image_raw"
      resolution: [640, 480]
      rate_hz: 30

  actuators:
    - name: "body_joints"
      type: "position_velocity_torque"
      control_mode: "position"
      count: 29
      joint_names:
        - left_hip_yaw_joint
        - left_hip_roll_joint
        - left_hip_pitch_joint
        - left_knee_joint
        - left_ankle_pitch_joint
        - left_ankle_roll_joint
        - right_hip_yaw_joint
        - right_hip_roll_joint
        - right_hip_pitch_joint
        - right_knee_joint
        - right_ankle_pitch_joint
        - right_ankle_roll_joint
        - waist_yaw_joint
        - waist_roll_joint
        - waist_pitch_joint
        - left_shoulder_pitch_joint
        - left_shoulder_roll_joint
        - left_shoulder_yaw_joint
        - left_elbow_joint
        - left_wrist_roll_joint
        - left_wrist_pitch_joint
        - left_wrist_yaw_joint
        - right_shoulder_pitch_joint
        - right_shoulder_roll_joint
        - right_shoulder_yaw_joint
        - right_elbow_joint
        - right_wrist_roll_joint
        - right_wrist_pitch_joint
        - right_wrist_yaw_joint

# ----------------------------------------------------------------------------
# STAGE 3: Models
# ----------------------------------------------------------------------------
models:
  # -------------------------
  # VLA Model (High-Level)
  # -------------------------
  - name: "groot_vla_n16"
    type: "vision_language_action"
    framework: "onnx"
    runtime: "tensorrt"
    precision: "fp16"
    model_path: "${RDP_ROOT}/models/groot/GR00T-N1.6-3B.onnx"
    download:
      enabled: true
      source: "huggingface"
      repo: "nvidia/GR00T-N1.6-3B"
      target_path: "${RDP_ROOT}/models/groot/"
    embodiment_tag: "UNITREE_G1_RELATIVE_EEF"

  # -------------------------
  # Local Motion Planner
  # -------------------------
  - name: "local_motion_planner"
    type: "trajectory_planner"
    framework: "onnx"
    runtime: "tensorrt"
    precision: "fp32"
    model_path: "${RDP_ROOT}/models/sonic_wbc/planner_sonic.onnx"

  # -------------------------
  # Observation Encoder
  # -------------------------
  - name: "sonic_encoder"
    type: "observation_encoder"
    framework: "onnx"
    runtime: "onnxruntime"
    precision: "fp32"
    model_path: "${RDP_ROOT}/models/sonic_wbc/model_encoder.onnx"
    config_file: "${GROOT_WBC_ROOT}/gear_sonic_deploy/policy/release/observation_config.yaml"

  # -------------------------
  # Policy Decoder
  # -------------------------
  - name: "sonic_policy_decoder"
    type: "action_policy"
    framework: "onnx"
    runtime: "onnxruntime"
    precision: "fp32"
    model_path: "${RDP_ROOT}/models/sonic_wbc/model_decoder.onnx"
    config_file: "${GROOT_WBC_ROOT}/gear_sonic_deploy/policy/release/observation_config.yaml"

  # -------------------------
  # PD Controller
  # -------------------------
  - name: "pd_controller"
    type: "classical_control"
    control_law: "pd"

# ----------------------------------------------------------------------------
# STAGE 4: Execution Graph
# ----------------------------------------------------------------------------
execution:
  orchestration_mode: "multi_threaded"

  nodes:
    - name: "groot_vla_inference"
      model: "groot_vla_n16"
      device: "gpu:0"
      frequency_hz: 5
      thread_priority: "normal"
      execution_mode: "periodic"
      hold_last_input: true

    - name: "planner_inference"
      model: "local_motion_planner"
      device: "gpu:0"
      frequency_hz: 10
      thread_priority: "high"
      execution_mode: "reactive"
      hold_last_input: false
      max_staleness_ms: 250
      handler: "handlers.sonic_planner.build_planner_obs"

    - name: "encoder_inference"
      model: "sonic_encoder"
      device: "gpu:0"
      frequency_hz: 50
      thread_priority: "high"
      execution_mode: "event_driven"
      timeout_ms: 120
      hold_last_input: true
      max_staleness_ms: 150
      handler: "handlers.sonic_encoder.build_obs"

    - name: "policy_inference"
      model: "sonic_policy_decoder"
      device: "gpu:0"
      frequency_hz: 50
      thread_priority: "realtime"
      execution_mode: "periodic"
      hold_last_input: true
      max_staleness_ms: 100
      handler: "handlers.sonic_decoder.build_policy_obs"

    - name: "pd_control"
      model: "pd_controller"
      device: "cpu"
      frequency_hz: 500
      thread_priority: "realtime"
      execution_mode: "periodic"
      hold_last_input: true
      max_staleness_ms: 20

  dataflow:
    - camera.rgb_image, language_input, robot_state → groot_vla_inference → high_level_command
    - high_level_command, robot_state → planner_inference → reference_trajectory
    - reference_trajectory, robot_state → encoder_inference → encoded_tokens
    - encoded_tokens, proprioception_history → policy_inference → action
    - action → pd_control → torque_commands → actuators

# ----------------------------------------------------------------------------
# STAGE 5: Configuration
# ----------------------------------------------------------------------------
configuration:
  # VLA Configuration
  vla:
    enabled: true
    model_type: "groot_n16"
    embodiment: "UNITREE_G1_RELATIVE_EEF"
    action_horizon: 8
    inference_steps: 10
    use_fp16: true

  # Harness configuration (used by mujoco_engine.py)
  harness:
    body: "torso_link"
    initial_height: 0.75
    stiffness: 3000.0
    damping: 200.0

  # SONIC WBC Configuration (all values inlined from policy_parameters.hpp)
  wbc:
    handler: "handlers.sonic_wbc.SonicWBCHandler"
    type: "sonic"
    num_actions: 29
    encoder_mode: 0

    # Observation dimensions
    # Encoder: union of all mode features = 1762 (see ENCODER_OBS_LAYOUT in sonic_mujoco_engine.py)
    encoder_obs_dim: 1762
    encoder_output_dim: 64
    # Decoder: token(64) + ang_vel_10f(30) + joint_pos_10f(290) + joint_vel_10f(290) + actions_10f(290) + gravity_10f(30) = 994
    policy_obs_dim: 994
    history_frames: 10
    history_step: 1

    # Standing pose (MuJoCo joint order, deeper crouch than decoupled WBC)
    default_angles: [
      -0.312,  0.0,  0.0,  0.669, -0.363,  0.0,    # left leg
      -0.312,  0.0,  0.0,  0.669, -0.363,  0.0,    # right leg
       0.0,    0.0,  0.0,                             # waist
       0.2,    0.2,  0.0,  0.6,  0.0, 0.0, 0.0,     # left arm
       0.2,   -0.2,  0.0,  0.6,  0.0, 0.0, 0.0      # right arm
    ]

    # PD gains (29 joints, MuJoCo order)
    # Computed from motor constants: kp = armature * omega^2, kd = 2 * zeta * armature * omega
    kps: [
       99.10,  99.10,  40.18,  99.10,  28.50,  28.50,   # left leg
       99.10,  99.10,  40.18,  99.10,  28.50,  28.50,   # right leg
       40.18,  28.50,  28.50,                             # waist
       14.25,  14.25,  14.25,  14.25,  14.25,  16.78,  16.78,  # left arm
       14.25,  14.25,  14.25,  14.25,  14.25,  16.78,  16.78   # right arm
    ]
    kds: [
       6.31,  6.31,  2.56,  6.31,  1.81,  1.81,   # left leg
       6.31,  6.31,  2.56,  6.31,  1.81,  1.81,   # right leg
       2.56,  1.81,  1.81,                          # waist
       0.91,  0.91,  0.91,  0.91,  0.91,  1.07,  1.07,  # left arm
       0.91,  0.91,  0.91,  0.91,  0.91,  1.07,  1.07   # right arm
    ]

    # Per-joint action scaling: 0.25 * effort_limit / stiffness
    action_scales: [
      0.351,  0.351,  0.548,  0.351,  0.439,  0.439,   # left leg
      0.351,  0.351,  0.548,  0.351,  0.439,  0.439,   # right leg
      0.548,  0.439,  0.439,                             # waist
      0.439,  0.439,  0.439,  0.439,  0.439,  0.075,  0.075,  # left arm
      0.439,  0.439,  0.439,  0.439,  0.439,  0.075,  0.075   # right arm
    ]

    # Joint order remapping (IsaacLab → MuJoCo index mapping)
    isaaclab_to_mujoco: [0, 3, 6, 9, 13, 17, 1, 4, 7, 10, 14, 18,
                         2, 5, 8, 11, 15, 19, 21, 23, 25, 27, 12, 16, 20, 22, 24, 26, 28]
    mujoco_to_isaaclab: [0, 6, 12, 1, 7, 13, 2, 8, 14, 3, 9, 15,
                         22, 4, 10, 16, 23, 5, 11, 17, 24, 18, 25, 19, 26, 20, 27, 21, 28]

    # Observation scales (from g1_29dof_sonic_model12.yaml)
    obs_scales:
      base_lin_vel: 2.0
      base_ang_vel: 0.25
      projected_gravity: 1.0
      dof_pos: 1.0
      dof_vel: 0.05
      actions: 1.0

  # Controller — activated via: --controller keyboard
  controller:
    locomotion_modes:
      IDLE: 0
      SLOW_WALK: 1
      WALK: 2
      RUN: 3
      SQUAT: 4
      KNEEL_TWO_LEGS: 5
      KNEEL: 6
      LYING_FACE_DOWN: 7
      CRAWLING: 8
      BOXING_IDLE: 9
      BOXING_WALK: 10
      LEFT_PUNCH: 11
      RIGHT_PUNCH: 12
      RANDOM_PUNCH: 13
      ELBOW_CRAWLING: 14
      LEFT_HOOK: 15
      RIGHT_HOOK: 16
      FORWARD_JUMP: 17
      STEALTH_WALK: 18
      INJURED_WALK: 19
      LEDGE_WALKING: 20
      OBJECT_CARRYING: 21
      STEALTH_WALK_2: 22
      HAPPY_DANCE_WALK: 23
      ZOMBIE_WALK: 24
      GUN_WALK: 25
      SCARE_WALK: 26

    default_command:
      locomotion_mode: IDLE
      movement_direction: [0.0, 0.0, 0.0]
      facing_direction: [1.0, 0.0, 0.0]
      movement_speed: -1.0
      height: -1.0

    encoder_modes:
      g1: 0
      teleop: 1
      smpl: 2

    # Activate with: --controller keyboard
    # Arrow keys set direction; number keys switch locomotion style.
    # Press 0 to return to IDLE (stop). MuJoCo viewer only fires key-press
    # events (no release), so movement is toggled, not held.
    # When controller is active, harness moves to H/J/K keys.
    keyboard:
      movement:
        UP:    { movement_direction: [1.0, 0.0, 0.0] }
        DOWN:  { movement_direction: [-1.0, 0.0, 0.0] }
        LEFT:  { movement_direction: [0.0, 1.0, 0.0] }
        RIGHT: { movement_direction: [0.0, -1.0, 0.0] }

      styles:
        "0": IDLE
        "1": SLOW_WALK
        "2": WALK
        "3": RUN
        "4": STEALTH_WALK
        "5": ZOMBIE_WALK
        "6": HAPPY_DANCE_WALK

  # Timing
  simulation_dt: 0.002
  control_decimation: 10
  control_frequency_hz: 50
  pd_frequency_hz: 500

  # Safety
  safety:
    joint_limits_check: true
    velocity_limits_check: true
    torque_limits_check: true
    emergency_stop_topic: "/emergency_stop"
    timeout_ms: 1000

# ----------------------------------------------------------------------------
# STAGE 6: External Interfaces
# ----------------------------------------------------------------------------
interfaces:
  - name: "gamepad_controller"
    type: "physical_device"
    protocol: "usb_hid"
    device_path: "/dev/input/js0"

  - name: "voice_command"
    type: "network"
    protocol: "grpc"
    endpoint: "localhost:50051"
    service: "VoiceCommandService"

  - name: "head_camera_server"
    type: "network"
    protocol: "zmq"
    endpoint: "tcp://192.168.123.164:5555"
    topic: "rgb_image"

  - name: "dds_control"
    type: "network"
    protocol: "dds"
    middleware: "cyclonedds"
    domain_id: 0
    topics:
      state: "rt/g1/state"
      command: "rt/g1/command"
    qos: best_effort
    unitree_compat: false

  - name: "mqtt_mission_cloud"
    type: "network"
    protocol: "mqtts"
    broker: "ccadc7de534d432e891f3603fff504a5.s1.eu.hivemq.cloud"
    port: 8883
    credentials:
      username: "${MQTT_USERNAME}"
      password: "${MQTT_PASSWORD}"
    topics:
      subscribe: ["robot/g1/mission/new", "robot/g1/command"]
      publish: ["robot/g1/status", "robot/g1/telemetry"]
    tls:
      enabled: true

# ----------------------------------------------------------------------------
# STAGE 7: Application
# ----------------------------------------------------------------------------
application:
  launcher:
    type: "tmux"
    session_name: "g1_sonic_wbc"

  setup:
    - name: "Download GR00T Model"
      command: "python ${RDP_ROOT}/scripts/download_groot_model.py --version n1.6"
      required: true

    - name: "Verify SONIC ONNX Models"
      command: "ls ${RDP_ROOT}/models/sonic_wbc/model_*.onnx"
      required: true

  launch_command: "python ${RDP_ROOT}/scripts/launch_robot.py --robot configs/robots/g1_sonic_wbc.yaml"

# ----------------------------------------------------------------------------
# STAGE 8: Monitoring
# ----------------------------------------------------------------------------
monitoring:
  telemetry:
    enabled: true
    publish_frequency_hz: 10
    topics:
      - "system/cpu_usage"
      - "system/gpu_usage"
      - "robot/joint_states"
      - "robot/inference_latency"

  logging:
    level: "INFO"
    output:
      - type: "file"
        path: "logs/g1_sonic_wbc_{timestamp}.log"
      - type: "console"
        format: "colored"

# ----------------------------------------------------------------------------
# STAGE 9: Deployment Profiles
# ----------------------------------------------------------------------------
deployment_profiles:
  - name: "simulation"
    overrides:
      interfaces:
        - name: "head_camera_server"
          endpoint: "tcp://localhost:5555"

  - name: "real_robot"
    overrides:
      interfaces:
        - name: "head_camera_server"
          endpoint: "tcp://192.168.123.164:5555"
      configuration:
        wbc:
          # Reduce waist Kd on real hardware
          kds_override:
            waist_pitch_joint: 1.51

  - name: "debug"
    overrides:
      monitoring:
        logging:
          level: "DEBUG"
      execution:
        nodes:
          - name: "groot_vla_inference"
            frequency_hz: 1
