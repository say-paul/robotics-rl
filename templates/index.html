<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>G1 Sim – Policy Runner</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #c9d1d9;
          --muted: #8b949e; --accent: #58a6ff; --green: #3fb950; --orange: #d29922;
          --red: #f85149; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; display:flex; height:100vh; overflow:hidden; }

  .viewer { flex:1; display:flex; flex-direction:column; min-width:0; }
  .viewer header { padding:8px 16px; background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .viewer header h1 { font-size:16px; font-weight:600; }
  .viewer header .tag { font-size:12px; color:var(--muted); }
  .stream-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:8px; position:relative; background:#000; }
  #stream { max-width:100%; max-height:100%; border-radius:6px; border:1px solid var(--border); cursor:grab; image-rendering:auto; }
  #stream:active { cursor:grabbing; }

  .hud { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(22,27,34,.85);
         border:1px solid var(--border); border-radius:6px; padding:6px 14px; font-size:11px; color:var(--muted);
         display:flex; gap:16px; backdrop-filter:blur(6px); pointer-events:none; }
  .hud span { color:var(--accent); font-weight:600; }

  .panel { width:320px; flex-shrink:0; background:var(--surface); border-left:1px solid var(--border);
           overflow-y:auto; display:flex; flex-direction:column; }
  .panel h2 { font-size:14px; font-weight:600; padding:12px 16px 8px; border-bottom:1px solid var(--border); }
  .section { padding:12px 16px; border-bottom:1px solid var(--border); }
  .section h3 { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:8px; font-weight:600; }

  .slider-row { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
  .slider-row label { width:56px; font-size:12px; color:var(--muted); flex-shrink:0; }
  .slider-row input[type=range] { flex:1; accent-color:var(--accent); }
  .slider-row .val { width:52px; text-align:right; font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; }

  .btn { border:1px solid var(--border); background:var(--bg); color:var(--text);
         border-radius:6px; padding:8px 12px; font-size:12px; cursor:pointer;
         transition:background .15s, border-color .15s; font-weight:500; }
  .btn:hover { background:var(--surface); border-color:var(--accent); }
  .btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:600; }
  .btn-primary:hover { background:#4c96e8; }
  .btn-danger { border-color:var(--red); color:var(--red); }
  .btn-danger:hover { background:rgba(248,81,73,.12); }
  .btn-reset { background:var(--orange); color:#000; border-color:var(--orange); font-weight:600; }
  .btn-reset:hover { background:#e6a817; }
  .btn-stop { background:var(--red); color:#fff; border-color:var(--red); font-weight:600; }
  .btn-stop:hover { background:#e04740; }
  .btn-lower { background:var(--orange); color:#000; border-color:var(--orange); font-weight:600; }
  .btn-lower:hover { background:#e6a817; }
  .btn.running { border-color:var(--green); background:rgba(63,185,80,.12); }

  select, .field-input {
    width:100%; background:var(--bg); border:1px solid var(--border); border-radius:6px;
    color:var(--text); padding:7px 10px; font-size:12px; appearance:auto;
  }
  select:focus, .field-input:focus { border-color:var(--accent); outline:none; }

  .field { margin-bottom:10px; }
  .field label { display:block; font-size:11px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:.4px; }

  .btn-row { display:flex; gap:6px; }
  .btn-row .btn { flex:1; }

  .auto-row { display:flex; gap:8px; align-items:center; margin-bottom:8px; }
  .auto-row label { font-size:12px; color:var(--muted); width:68px; flex-shrink:0; }
  .auto-row input { width:60px; background:var(--bg); border:1px solid var(--border); border-radius:4px;
                    color:var(--text); padding:4px 6px; font-size:12px; text-align:center; }
  .auto-row .unit { font-size:11px; color:var(--muted); }

  #forceGraph { width:100%; height:60px; border-radius:4px; background:var(--bg); border:1px solid var(--border); }

  .status-bar { display:flex; gap:14px; padding:8px 16px; font-size:11px; color:var(--muted); border-top:1px solid var(--border); margin-top:auto; }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; vertical-align:middle; }
  .dot-on { background:var(--green); }
  .dot-off { background:var(--red); }
  .dot-auto { background:var(--orange); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .help { padding:8px 16px; font-size:11px; color:var(--muted); line-height:1.7; }
  kbd { background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:1px 5px; font-size:10px; color:var(--text); }
</style>
</head>
<body>

<div class="viewer">
  <header>
    <h1>Unitree G1 &mdash; Policy Runner</h1>
    <span class="tag">DDS domain <strong>{{ domain_id }}</strong> &middot; <strong>{{ interface }}</strong></span>
  </header>
  <div class="stream-wrap">
    <canvas id="stream"></canvas>
    <div class="hud">
      <div>Az <span id="hud-az">0</span>&deg;</div>
      <div>El <span id="hud-el">0</span>&deg;</div>
      <div>Dist <span id="hud-dist">0</span></div>
      <div>Robot Z <span id="hud-rz">0</span></div>
      <div>FPS <span id="hud-fps">-</span></div>
    </div>
  </div>
</div>

<div class="panel">
  <h2>Controls</h2>

  <!-- Reset -->
  <div class="section">
    <button class="btn btn-reset" id="btn-reset" onclick="resetRobot()" style="width:100%;padding:10px;font-size:13px;">
      Reset Robot
    </button>
  </div>

  <!-- Harness -->
  <div class="section">
    <h3>Harness</h3>
    <div class="btn-row" style="margin-bottom:10px;">
      <button class="btn btn-primary" id="btn-engage" onclick="engageHarness()">Engage</button>
      <button class="btn btn-danger" id="btn-release" onclick="releaseHarness()">Release</button>
    </div>
    <div class="slider-row">
      <label>Height</label>
      <input type="range" id="sl-height" min="0" max="3" step="0.01" value="1.5"/>
      <div class="val" id="v-height">1.50 m</div>
    </div>
    <h3 style="margin-top:4px;">Auto Lower</h3>
    <div class="auto-row">
      <label>Duration</label>
      <input id="auto-dur" type="number" value="10" min="1" max="120"/>
      <span class="unit">sec</span>
    </div>
    <div class="auto-row">
      <label>Target H</label>
      <input id="auto-th" type="number" value="0.78" min="0" max="3" step="0.01"/>
      <span class="unit">m</span>
    </div>
    <div class="btn-row" style="margin-top:4px;">
      <button class="btn btn-lower" id="btn-auto" onclick="autoLower()">Start Lowering</button>
      <button class="btn btn-stop" onclick="autoStop()" style="flex:0 0 60px;">Stop</button>
    </div>
  </div>

  <!-- ONNX Policy -->
  <div class="section">
    <h3>ONNX Policy</h3>
    <div class="field">
      <label>Model</label>
      <select id="policy-select"></select>
    </div>
    <div class="field">
      <label>Device</label>
      <select id="policy-device">
        <option value="CPU">CPU</option>
        <option value="NPU">NPU</option>
        <option value="GPU">GPU</option>
      </select>
    </div>
    <div class="slider-row">
      <label>Vx</label>
      <input type="range" id="sl-vx" min="-1" max="1" step="0.05" value="0.0"/>
      <div class="val" id="v-vx">0.00</div>
    </div>
    <div class="slider-row">
      <label>Vy</label>
      <input type="range" id="sl-vy" min="-0.5" max="0.5" step="0.05" value="0.0"/>
      <div class="val" id="v-vy">0.00</div>
    </div>
    <div class="slider-row">
      <label>Vyaw</label>
      <input type="range" id="sl-vyaw" min="-1" max="1" step="0.05" value="0.0"/>
      <div class="val" id="v-vyaw">0.00</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-policy" onclick="startPolicy()">Run Policy</button>
      <button class="btn btn-danger" onclick="stopAction()" style="flex:0 0 60px;">Stop</button>
    </div>
  </div>

  <!-- Force graph -->
  <div class="section">
    <h3>Harness Force</h3>
    <canvas id="forceGraph"></canvas>
  </div>

  <div class="section help">
    <strong>Camera</strong><br/>
    <kbd>Left-drag</kbd> Orbit &nbsp; <kbd>Right-drag</kbd> Pan &nbsp; <kbd>Scroll</kbd> Zoom &nbsp; <kbd>R</kbd> Reset
  </div>

  <div class="status-bar">
    <div><span class="status-dot" id="dot-harness"></span> Harness <span id="st-harness">-</span></div>
    <div><span class="status-dot" id="dot-auto"></span> Auto <span id="st-auto">off</span></div>
    <div><span class="status-dot" id="dot-action"></span> Policy <span id="st-action">-</span></div>
  </div>
</div>

<script>
// ===== WebSocket + Canvas stream =====
const cv = document.getElementById('stream');
const gl = cv.getContext('2d');

let pendingBlob = null;
let rafScheduled = false;
let fpsFrames = 0, fpsLast = performance.now();

function connectStream() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(proto + '//' + location.host + '/ws/stream');
  ws.binaryType = 'arraybuffer';

  ws.onmessage = (e) => {
    pendingBlob = new Blob([e.data], {type: 'image/jpeg'});
    if (!rafScheduled) { rafScheduled = true; requestAnimationFrame(renderFrame); }
  };
  ws.onclose = () => setTimeout(connectStream, 1000);
  ws.onerror = () => ws.close();
}

async function renderFrame() {
  rafScheduled = false;
  if (!pendingBlob) return;
  const blob = pendingBlob; pendingBlob = null;
  const bmp = await createImageBitmap(blob);
  if (cv.width !== bmp.width || cv.height !== bmp.height) { cv.width = bmp.width; cv.height = bmp.height; }
  gl.drawImage(bmp, 0, 0); bmp.close();
  fpsFrames++;
  const now = performance.now();
  if (now - fpsLast >= 1000) {
    document.getElementById('hud-fps').textContent = fpsFrames;
    fpsFrames = 0; fpsLast = now;
  }
}
connectStream();

// ===== Camera controls =====
let dragging = false, mbtn = 0, lastX = 0, lastY = 0;
function sendCam(p){fetch('/camera',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});}
cv.addEventListener('mousedown', e => { dragging = true; mbtn = e.button; lastX = e.clientX; lastY = e.clientY; e.preventDefault(); });
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  if (mbtn === 0) sendCam({action:'orbit', dx, dy});
  else if (mbtn === 2) sendCam({action:'pan', dx, dy});
});
cv.addEventListener('wheel', e => { e.preventDefault(); sendCam({action:'zoom', delta:e.deltaY}); });
cv.addEventListener('contextmenu', e => e.preventDefault());
window.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') sendCam({action:'reset'}); });

// ===== Reset =====
function resetRobot() {
  fetch('/reset', {method:'POST'}).then(() => {
    document.getElementById('btn-policy').classList.remove('running');
  });
}

// ===== Harness =====
function sendHarness(p){fetch('/harness',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)});}
function engageHarness(){
  fetch('/harness/preset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({preset:'full'})});
}
function releaseHarness(){
  fetch('/harness/preset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({preset:'released'})});
}
document.getElementById('sl-height').addEventListener('input', function(){
  document.getElementById('v-height').textContent = parseFloat(this.value).toFixed(2)+' m';
  sendHarness({height: parseFloat(this.value)});
});

// ===== Auto lower =====
function autoLower(){
  const dur = parseFloat(document.getElementById('auto-dur').value);
  const th  = parseFloat(document.getElementById('auto-th').value);
  fetch('/harness/auto_lower',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({duration:dur, target_height:th, target_stiffness:0})});
}
function autoStop(){fetch('/harness/auto_stop',{method:'POST'});}

// ===== Policy =====
function loadPolicies() {
  fetch('/policies').then(r=>r.json()).then(d => {
    const sel = document.getElementById('policy-select');
    sel.innerHTML = '';
    d.policies.forEach(name => {
      const opt = document.createElement('option');
      opt.value = 'policies/' + name;
      opt.textContent = name;
      sel.appendChild(opt);
    });
  });
}
loadPolicies();

function startPolicy(){
  const body = {
    name: 'policy',
    policy_path: document.getElementById('policy-select').value,
    device: document.getElementById('policy-device').value,
    vx: parseFloat(document.getElementById('sl-vx').value),
    vy: parseFloat(document.getElementById('sl-vy').value),
    vyaw: parseFloat(document.getElementById('sl-vyaw').value),
  };
  fetch('/action/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
}
function stopAction(){fetch('/action/stop',{method:'POST'});}

['sl-vx','sl-vy','sl-vyaw'].forEach(id => {
  document.getElementById(id).addEventListener('input', function(){
    document.getElementById('v-'+id.slice(3)).textContent = parseFloat(this.value).toFixed(2);
  });
});

// ===== Polling state =====
function poll(){
  fetch('/state').then(r=>r.json()).then(d=>{
    const h = d.harness, c = d.camera;

    document.getElementById('sl-height').value = h.height;
    document.getElementById('v-height').textContent = h.height.toFixed(2)+' m';

    document.getElementById('hud-az').textContent = c.azimuth.toFixed(1);
    document.getElementById('hud-el').textContent = c.elevation.toFixed(1);
    document.getElementById('hud-dist').textContent = c.distance.toFixed(2);
    document.getElementById('hud-rz').textContent = d.robot_z.toFixed(3);

    const dotH = document.getElementById('dot-harness');
    dotH.className = 'status-dot ' + (h.enabled ? 'dot-on' : 'dot-off');
    document.getElementById('st-harness').textContent = h.enabled ? 'ON' : 'OFF';
    document.getElementById('btn-engage').classList.toggle('running', h.enabled);
    document.getElementById('btn-release').classList.toggle('running', !h.enabled);

    const dotA = document.getElementById('dot-auto');
    dotA.className = 'status-dot ' + (h.auto_lowering ? 'dot-auto' : 'dot-off');
    document.getElementById('st-auto').textContent = h.auto_lowering ? 'lowering' : 'off';

    const actName = d.action;
    const dotAc = document.getElementById('dot-action');
    dotAc.className = 'status-dot ' + (actName ? 'dot-on' : 'dot-off');
    document.getElementById('st-action').textContent = actName || '-';
    document.getElementById('btn-policy').classList.toggle('running', !!actName);

    drawGraph(h.force_history || []);
  }).catch(()=>{});
}
setInterval(poll, 300);
poll();

// ===== Force graph =====
const fgCanvas = document.getElementById('forceGraph');
const fgCtx = fgCanvas.getContext('2d');
function drawGraph(data){
  const W = fgCanvas.width = fgCanvas.offsetWidth * 2, H = fgCanvas.height = fgCanvas.offsetHeight * 2;
  fgCtx.clearRect(0, 0, W, H);
  if (data.length < 2) return;
  const maxF = Math.max(50, ...data) * 1.1;
  fgCtx.strokeStyle = '#58a6ff'; fgCtx.lineWidth = 2; fgCtx.beginPath();
  for (let i = 0; i < data.length; i++) {
    const x = i / (data.length - 1) * W, y = H - data[i] / maxF * H;
    i === 0 ? fgCtx.moveTo(x, y) : fgCtx.lineTo(x, y);
  }
  fgCtx.stroke();
  fgCtx.fillStyle = '#8b949e'; fgCtx.font = '18px sans-serif';
  fgCtx.fillText(Math.round(data[data.length - 1]) + ' N', 8, 22);
  fgCtx.fillText('max ' + Math.round(maxF) + ' N', W - 120, 22);
}
</script>
</body>
</html>
